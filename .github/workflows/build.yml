name: build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - name: Host deps
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget unzip yasm nasm pkg-config build-essential python3

      - name: Download NDK r14b (gcc 4.9; ijkplayer k0.8.8 only accepts NDK rev 11-14)
        run: |
          cd $HOME
          wget -q https://dl.google.com/android/repository/android-ndk-r14b-linux-x86_64.zip
          unzip -q android-ndk-r14b-linux-x86_64.zip
          echo "ANDROID_NDK=$HOME/android-ndk-r14b" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/android-ndk-r14b" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$HOME/android-ndk-r14b" >> $GITHUB_ENV
          echo "$HOME/android-ndk-r14b" >> $GITHUB_PATH

      - name: Clone ijkplayer k0.8.8
        run: git clone --depth 1 --branch k0.8.8 https://github.com/bilibili/ijkplayer.git ijk

      - name: init-android
        run: |
          cd ijk
          ./init-android.sh

      - name: Patch module for full audio codecs
        run: |
          cd ijk/config
          echo '' >> module-lite.sh
          echo '# CINE TV: full audio codecs (MP1/MP2/AC3/EAC3/DTS)' >> module-lite.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-decoder=mp1 --enable-decoder=mp1float"' >> module-lite.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-decoder=mp2 --enable-decoder=mp2float"' >> module-lite.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-decoder=ac3 --enable-decoder=ac3_fixed --enable-decoder=eac3"' >> module-lite.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-decoder=dca"' >> module-lite.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-decoder=pcm_s16be --enable-decoder=pcm_s24be"' >> module-lite.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-parser=mpegaudio --enable-parser=ac3 --enable-parser=dca"' >> module-lite.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-demuxer=ac3 --enable-demuxer=eac3 --enable-demuxer=dts"' >> module-lite.sh
          echo '# CINE TV: VOD containers (mkv/webm/avi/wmv/ogg) + sus codecs (DivX/Xvid, vorbis, opus, wmv)' >> module-lite.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-demuxer=matroska --enable-demuxer=webm_dash_manifest --enable-demuxer=avi --enable-demuxer=asf --enable-demuxer=wav --enable-demuxer=ogg --enable-demuxer=m4v"' >> module-lite.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-decoder=mpeg4 --enable-decoder=msmpeg4v1 --enable-decoder=msmpeg4v2 --enable-decoder=msmpeg4v3 --enable-decoder=mpeg2video --enable-decoder=mjpeg"' >> module-lite.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-decoder=vorbis --enable-decoder=opus --enable-decoder=wmav2 --enable-decoder=wmapro --enable-decoder=wmv1 --enable-decoder=wmv2 --enable-decoder=wmv3 --enable-decoder=vc1"' >> module-lite.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-parser=mpeg4video --enable-parser=mpegvideo --enable-parser=vorbis --enable-parser=opus --enable-parser=vp9"' >> module-lite.sh
          echo '# CINE TV: subtitulos de texto (embebidos en mkv/mp4 + SRT/VTT externo)' >> module-lite.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-decoder=subrip --enable-decoder=srt --enable-decoder=ssa --enable-decoder=ass --enable-decoder=webvtt --enable-decoder=movtext --enable-decoder=text --enable-decoder=dvbsub --enable-decoder=dvdsub --enable-decoder=xsub"' >> module-lite.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-encoder=ssa --enable-encoder=ass --enable-encoder=movtext --enable-encoder=subrip --enable-encoder=text --enable-encoder=webvtt"' >> module-lite.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-demuxer=srt --enable-demuxer=ass --enable-demuxer=webvtt --enable-demuxer=subviewer --enable-demuxer=microdvd --enable-demuxer=jacosub"' >> module-lite.sh
          echo 'export COMMON_FF_CFG_FLAGS="$COMMON_FF_CFG_FLAGS --enable-muxer=ass --enable-muxer=srt --enable-muxer=webvtt"' >> module-lite.sh
          ln -sf module-lite.sh module.sh
          echo "=== tail module-lite.sh ==="
          tail -18 module-lite.sh

      - name: Compile FFmpeg armv7a
        run: |
          cd ijk/android/contrib
          ./compile-ffmpeg.sh armv7a

      - name: Patch subtitle text delivery to Java (onTimedText)
        run: |
          cd ijk
          echo '' | base64 -d > /tmp/patch_subs.py
          python3 /tmp/patch_subs.py
          echo "=== verificacion ==="
          grep -n "CINE TV: entregar subtitulos" ijkmedia/ijkplayer/ff_ffplay.c

      - name: Compile ijkplayer JNI armv7a (best effort)
        continue-on-error: true
        run: |
          cd ijk/android
          ./compile-ijk.sh armv7a

      - name: Collect .so
        run: |
          mkdir -p out
          find ijk -name 'libijk*.so' -path '*armeabi-v7a*' -exec cp -f {} out/ \; || true
          find ijk -name 'libijkffmpeg.so' -exec cp -f {} out/ \; || true
          echo "=== collected ==="
          ls -la out

      - name: Verify audio + subtitle decoders compiled in
        run: |
          grep -aoE 'enable-decoder=[a-z0-9_*]+' out/libijkffmpeg.so | sort -u > decs.txt
          echo "=== decoders found in libijkffmpeg.so ==="
          cat decs.txt
          for d in mp2 ac3 eac3 subrip ass webvtt movtext; do
            grep -qx "enable-decoder=$d" decs.txt || { echo "MISSING $d"; exit 1; }
          done
          echo "OK: audio + subtitle decoders present"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ijk-armv7a-fullcodec
          path: out/*.so
          if-no-files-found: error
